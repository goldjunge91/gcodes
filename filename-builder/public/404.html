<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slicer Filename Builder</title>
    <script>
        // SPA redirect for GitHub Pages
        const path = window.location.pathname;
        const baseName = '/filename-builder';

        if (path.indexOf(baseName + '/') !== 0) {
            window.location.replace(baseName + '/#' + path);
        }
    </script>
</head>

<body></body>

</html>
