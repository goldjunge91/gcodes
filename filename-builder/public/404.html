<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/filename-builder/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slicer Filename Builder</title>
    <script>
        // SPA fallback: redirect 404s to index.html
        var pathSegmentsToKeep = 1; // filename-builder depth
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/filename-builder/index.html?p=' +
            l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1).slice(0, -1)
                .split('/')
                .slice(-pathSegmentsToKeep)
                .join('/') +
            '&q=' +
            l.search
        );
    </script>
</head>

<body> </body>

</html>
